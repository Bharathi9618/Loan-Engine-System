# Server — Render injects PORT
server.port=${PORT:8080}

# Database (set in Render dashboard)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# OTP
app.otp.expiry-minutes=5
app.otp.length=6

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}
app.mail.dev-log-only=${MAIL_DEV_LOG:true}

# CORS — set CORS_ALLOWED_ORIGINS to your Vercel URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://loan-engine.vercel.app}

# Actuator / health check (Render: /actuator/health)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.com.loanengine=INFO
logging.level.org.springframework.security=INFO
