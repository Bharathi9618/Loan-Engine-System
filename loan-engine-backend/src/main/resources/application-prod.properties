# Server — Render injects PORT
server.port=${PORT:8080}

# Database — configured by DatabaseConfig.java from env vars on Render
# Set SPRING_DATASOURCE_URL or DATABASE_URL (+ username/password if not in URL)
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET:LoanEngineProdSecretKeyMustBeAtLeast256BitsLongForHS256!!}
app.jwt.expiration-ms=86400000

# OTP
app.otp.expiry-minutes=5
app.otp.length=6

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}
app.mail.dev-log-only=${MAIL_DEV_LOG:true}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://loan-engine.vercel.app}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.com.loanengine=INFO
