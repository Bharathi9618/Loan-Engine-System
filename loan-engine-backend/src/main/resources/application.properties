# Spring Application Name
spring.application.name=loan-engine-backend

# Active profile: use SPRING_PROFILES_ACTIVE=prod on Render
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Datasource (local defaults — override via env vars)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/loan_engine_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:LoanEngineSecretKeyForJWTTokenGenerationMustBe256BitsLongMinimum!!}
app.jwt.expiration-ms=86400000

# OTP
app.otp.expiry-minutes=5
app.otp.length=6

# Mail app settings
app.mail.from=${MAIL_FROM:noreply@loanengine.local}
app.mail.dev-log-only=${MAIL_DEV_LOG:true}

# CORS (local dev)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
